name: Web Preview

# Builds the Flutter app for web and publishes it to GitHub Pages so the
# latest UI can be previewed from any browser (phone included).
on:
  push:
    branches:
      - main
      - claude/response-time-per-game-ge4ez5
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        # --base-href must match the Pages sub-path: https://<user>.github.io/Improvy/
        run: flutter build web --release --base-href /Improvy/

      - name: Publish build to web-build branch
        # Sandboxed dev environments can't reach *.github.io or the Actions
        # artifact store, but can fetch branches over git — so the built site
        # is also force-pushed to a throwaway branch for local previews.
        run: |
          cd build/web
          git init -q -b web-build
          git -c user.name=github-actions -c user.email=github-actions@github.com add -A
          git -c user.name=github-actions -c user.email=github-actions@github.com commit -q -m "Web build of ${GITHUB_SHA}"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" web-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
