name: improvy
description: "Improvy - Music Interval Trainer"
publish_to: 'none'

version: 1.0.20+26

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  go_router: ^14.6.2
  fl_chart: ^0.69.0
  confetti: ^0.7.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  purchases_flutter: ^10.3.0
  purchases_ui_flutter: ^10.3.0
  posthog_flutter: ^5.24.0
  # Local scheduled notifications (daily reminder / comeback). No web support —
  # all usage goes through lib/services/notification_service.dart, whose
  # conditional import keeps the web build compiling with a no-op stub.
  flutter_local_notifications: ^18.0.1
  timezone: ">=0.9.0 <0.11.0"
  # Text-to-speech for Pocket Mode (hands-free audio training). Works on
  # iOS/Android/web; iOS keeps speaking with the screen locked via the
  # playback audio category + the `audio` background mode (see Info.plist).
  flutter_tts: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: NotoMusic
      fonts:
        - asset: assets/fonts/NotoMusic-Regular.ttf
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-Light.ttf
          weight: 300
        - asset: assets/fonts/Lexend-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lexend-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lexend-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lexend-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lexend-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Lexend-Black.ttf
          weight: 900
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
