# ─────────────────────────────────────────────────────────────────────────────
# Improvy — iOS build & TestFlight on Codemagic (no Mac).
#
# Signing strategy: because a distribution certificate's PRIVATE KEY only exists
# where the cert was first created, any pre-existing cert in the Apple account is
# unusable on this build machine ("Cannot save Signing Certificates without
# certificate private key"). So the build itself deletes existing distribution
# certificates via the App Store Connect API and mints a fresh one whose private
# key it generates and keeps — then creates the matching App Store profile.
# ─────────────────────────────────────────────────────────────────────────────
workflows:
  ios-testflight:
    name: iOS · TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: chiaveapipercodemagic
    environment:
      vars:
        APP_STORE_APPLE_ID: 6775236759
        BUNDLE_ID: "com.improvy.app"
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Reset signing — delete stale certs, mint a fresh one we own
        script: |
          set -e
          keychain initialize
          echo "Removing any existing distribution certificates (we don't hold their private keys)..."
          for T in IOS_DISTRIBUTION DISTRIBUTION; do
            app-store-connect certificates list --type "$T" --json 2>/dev/null | jq -r '.[].id' 2>/dev/null || true
          done | sort -u | while read -r cid; do
            if [ -n "$cid" ]; then
              echo "  deleting certificate $cid"
              app-store-connect certificates delete "$cid" || true
            fi
          done
          echo "Creating a fresh distribution certificate + App Store provisioning profile..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build signed IPA (build number = latest TestFlight + 1)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          flutter build ipa --release \
            --build-number=$(($LATEST + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - lorenzo.ballestrazzi07@gmail.com
        notify:
          success: true
          failure: true
