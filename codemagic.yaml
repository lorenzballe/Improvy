workflows:
  ios-testflight:
    name: iOS · TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: chiaveapipercodemagic

    environment:
      vars:
        APP_STORE_APPLE_ID: 6775236759
        BUNDLE_ID: "com.improvy.app"

      flutter: stable
      xcode: latest
      cocoapods: default

    ios_signing:
      distribution_type: app_store
      bundle_identifier: com.improvy.app

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS IPA
        script: flutter build ipa --release \
          --build-number=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - lorenzo.ballestrazzi07@gmail.com
        notify:
          success: true
          failure: true